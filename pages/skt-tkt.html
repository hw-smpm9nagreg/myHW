<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>myHW - SKT & TKT</title>
<link rel="icon" href="https://lh3.googleusercontent.com/d/1csvYSWImSM_A8khBCr8K1ovcKW8wCuaw" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css" />
<link rel="manifest" href="../manifest.json" />
<meta name="theme-color" content="#0F766E" />
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="pb-10" style="background: var(--color-bg);">

  <header class="gradient-primary px-4 pt-6 pb-8 flex items-center gap-3" style="border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg);">
    <a href="../dashboard.html" class="w-9 h-9 rounded-full bg-white/15 flex items-center justify-center text-white">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <div>
      <h1 class="text-white font-bold text-lg">SKT &amp; TKT</h1>
      <p class="text-teal-50/80 text-xs">Syarat &amp; Tanda Kenaikan Tingkat</p>
    </div>
  </header>

  <main class="px-4 -mt-4">

    <!-- ===== Filter ===== -->
    <div class="card-soft p-3 flex flex-col gap-2">
      <select id="filterAnggota" class="input-soft py-2.5 px-3 text-sm">
        <option value="">Semua Anggota</option>
      </select>
      <div class="flex gap-2">
        <select id="filterJenis" class="input-soft py-2.5 px-3 text-sm flex-1">
          <option value="">Semua Jenis</option>
          <option value="SKT">SKT</option>
          <option value="TKT">TKT</option>
        </select>
        <select id="filterStatus" class="input-soft py-2.5 px-3 text-sm flex-1">
          <option value="">Semua Status</option>
          <option value="belum">Belum Mulai</option>
          <option value="proses">Dalam Proses</option>
          <option value="lulus">Lulus</option>
        </select>
      </div>
    </div>

    <div id="sktList" class="mt-4 space-y-3"></div>
  </main>

  <button id="btnAdd" class="fab-scan fixed bottom-6 right-5 w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl shadow-lg">
    <i class="fa-solid fa-plus"></i>
  </button>

  <!-- ===== Form Modal ===== -->
  <div id="formModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-end sm:items-center justify-center">
    <div class="bg-white w-full sm:max-w-md rounded-t-[var(--radius-lg)] sm:rounded-[var(--radius-lg)] max-h-[92vh] overflow-y-auto p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 id="formTitle" class="font-bold text-lg text-slate-800">Tambah Catatan</h2>
        <button id="btnCloseForm" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="sktForm" class="space-y-3 text-sm">
        <input type="hidden" id="f_id" />
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Anggota</label>
          <select id="f_anggotaId" class="input-soft w-full px-3 py-2.5" required></select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Jenis</label>
            <select id="f_jenis" class="input-soft w-full px-3 py-2.5">
              <option value="SKT">SKT</option>
              <option value="TKT">TKT</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Tingkat</label>
            <input id="f_tingkat" class="input-soft w-full px-3 py-2.5" placeholder="Contoh: Melati Satu" required />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Syarat / Materi Uji</label>
          <textarea id="f_syarat" rows="2" class="input-soft w-full px-3 py-2.5" placeholder="Ringkasan syarat kecakapan yang diuji"></textarea>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Progress (<span id="progressValue">0</span>%)</label>
          <input type="range" min="0" max="100" step="5" id="f_progress" class="w-full accent-[#0F766E]" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Tanggal Ujian</label>
            <input type="date" id="f_tanggalUjian" class="input-soft w-full px-3 py-2.5" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Penguji</label>
            <input id="f_penguji" class="input-soft w-full px-3 py-2.5" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Status</label>
          <select id="f_status" class="input-soft w-full px-3 py-2.5">
            <option value="belum">Belum Mulai</option>
            <option value="proses">Dalam Proses</option>
            <option value="lulus">Lulus</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Catatan</label>
          <textarea id="f_catatan" rows="2" class="input-soft w-full px-3 py-2.5"></textarea>
        </div>
        <button type="submit" class="btn-primary w-full py-3 mt-2">Simpan Catatan</button>
      </form>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/pages/skt-tkt.js"></script>
  <script>window.PWA_SW_PATH = "../sw.js"; window.PWA_SCOPE = "../";</script>
  <script src="../assets/js/pwa.js"></script>
</body>
</html>
