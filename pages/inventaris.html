<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>myHW - Inventaris</title>
<link rel="icon" href="https://lh3.googleusercontent.com/d/1csvYSWImSM_A8khBCr8K1ovcKW8wCuaw" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="pb-10" style="background: var(--color-bg);">

  <header class="gradient-primary px-4 pt-6 pb-8 flex items-center gap-3" style="border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg);">
    <a href="../dashboard.html" class="w-9 h-9 rounded-full bg-white/15 flex items-center justify-center text-white">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <div>
      <h1 class="text-white font-bold text-lg">Inventaris</h1>
      <p class="text-teal-50/80 text-xs">Barang &amp; riwayat peminjaman</p>
    </div>
  </header>

  <main class="px-4 -mt-4">

    <!-- ===== Tabs ===== -->
    <div class="card-soft p-1.5 flex gap-1">
      <button id="tabBarang" class="tab-btn flex-1 py-2.5 rounded-[var(--radius-sm)] text-sm font-semibold">Barang</button>
      <button id="tabPeminjaman" class="tab-btn flex-1 py-2.5 rounded-[var(--radius-sm)] text-sm font-semibold">Peminjaman</button>
    </div>

    <!-- ===== Barang tab ===== -->
    <div id="panelBarang">
      <div class="card-soft p-3 mt-3 flex items-center gap-2">
        <div class="relative flex-1">
          <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
          <input id="searchInput" type="text" placeholder="Cari nama barang..." class="input-soft w-full pl-10 pr-3 py-2.5 text-sm" />
        </div>
        <select id="filterKategori" class="input-soft py-2.5 px-2 text-sm shrink-0">
          <option value="">Semua Kategori</option>
          <option>Tenda</option>
          <option>Perlengkapan Camping</option>
          <option>Seragam</option>
          <option>P3K</option>
          <option>Alat Musik</option>
          <option>Elektronik</option>
          <option>Lainnya</option>
        </select>
        <button id="btnExport" class="w-11 h-11 rounded-[var(--radius-sm)] bg-slate-100 flex items-center justify-center text-slate-600 shrink-0">
          <i class="fa-solid fa-file-excel"></i>
        </button>
      </div>
      <div id="barangList" class="mt-4 space-y-3"></div>
    </div>

    <!-- ===== Peminjaman tab ===== -->
    <div id="panelPeminjaman" class="hidden">
      <div id="peminjamanList" class="mt-4 space-y-3"></div>
    </div>
  </main>

  <button id="btnAdd" class="fab-scan fixed bottom-6 right-5 w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl shadow-lg">
    <i class="fa-solid fa-plus"></i>
  </button>

  <!-- ===== Form Modal Barang ===== -->
  <div id="formModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-end sm:items-center justify-center">
    <div class="bg-white w-full sm:max-w-md rounded-t-[var(--radius-lg)] sm:rounded-[var(--radius-lg)] max-h-[92vh] overflow-y-auto p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 id="formTitle" class="font-bold text-lg text-slate-800">Tambah Barang</h2>
        <button id="btnCloseForm" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="barangForm" class="space-y-3 text-sm">
        <input type="hidden" id="f_id" />
        <div class="flex items-center gap-3">
          <div id="fotoPreview" class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400 overflow-hidden shrink-0">
            <i class="fa-solid fa-box"></i>
          </div>
          <div class="flex-1">
            <label class="block text-xs font-semibold text-slate-600 mb-1">Foto Barang</label>
            <input type="file" id="f_foto" accept="image/*" class="text-xs w-full" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Nama Barang</label>
          <input id="f_namaBarang" class="input-soft w-full px-3 py-2.5" required />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Kategori</label>
            <select id="f_kategori" class="input-soft w-full px-3 py-2.5">
              <option>Tenda</option>
              <option>Perlengkapan Camping</option>
              <option>Seragam</option>
              <option>P3K</option>
              <option>Alat Musik</option>
              <option>Elektronik</option>
              <option>Lainnya</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Jumlah</label>
            <input type="number" min="0" id="f_jumlah" class="input-soft w-full px-3 py-2.5" required />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Lokasi</label>
            <input id="f_lokasi" class="input-soft w-full px-3 py-2.5" placeholder="Contoh: Gudang Utama" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Kondisi</label>
            <select id="f_kondisi" class="input-soft w-full px-3 py-2.5">
              <option value="baik">Baik</option>
              <option value="rusak_ringan">Rusak Ringan</option>
              <option value="rusak_berat">Rusak Berat</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-primary w-full py-3 mt-2">Simpan Barang</button>
      </form>
    </div>
  </div>

  <!-- ===== Detail / QR Modal ===== -->
  <div id="detailModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-[var(--radius-lg)] p-6 text-center">
      <button id="btnCloseDetail" class="ml-auto block w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 mb-2"><i class="fa-solid fa-xmark"></i></button>
      <div id="qrCodeCanvas" class="mx-auto w-40 h-40 flex items-center justify-center bg-slate-50 rounded-2xl mb-4"></div>
      <h3 id="detailNama" class="font-bold text-slate-800"></h3>
      <p id="detailKategori" class="text-xs text-slate-500 mb-4"></p>
      <button id="btnPinjam" class="btn-primary w-full py-2.5"><i class="fa-solid fa-right-from-bracket mr-1"></i> Catat Peminjaman</button>
    </div>
  </div>

  <!-- ===== Form Modal Peminjaman ===== -->
  <div id="pinjamModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-end sm:items-center justify-center">
    <div class="bg-white w-full sm:max-w-md rounded-t-[var(--radius-lg)] sm:rounded-[var(--radius-lg)] max-h-[92vh] overflow-y-auto p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold text-lg text-slate-800">Catat Peminjaman</h2>
        <button id="btnClosePinjam" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="pinjamForm" class="space-y-3 text-sm">
        <input type="hidden" id="p_inventarisId" />
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Peminjam</label>
          <select id="p_anggotaId" class="input-soft w-full px-3 py-2.5" required></select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Jumlah</label>
            <input type="number" min="1" id="p_jumlah" value="1" class="input-soft w-full px-3 py-2.5" required />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Rencana Kembali</label>
            <input type="date" id="p_tanggalKembaliRencana" class="input-soft w-full px-3 py-2.5" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Catatan</label>
          <textarea id="p_catatan" rows="2" class="input-soft w-full px-3 py-2.5"></textarea>
        </div>
        <button type="submit" class="btn-primary w-full py-3 mt-2">Simpan Peminjaman</button>
      </form>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/pages/inventaris.js"></script>
</body>
</html>
