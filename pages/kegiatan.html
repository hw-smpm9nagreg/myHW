<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>myHW - Kegiatan</title>
<link rel="icon" href="https://lh3.googleusercontent.com/d/1csvYSWImSM_A8khBCr8K1ovcKW8wCuaw" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="pb-10" style="background: var(--color-bg);">

  <header class="gradient-primary px-4 pt-6 pb-8 flex items-center gap-3" style="border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg);">
    <a href="../dashboard.html" class="w-9 h-9 rounded-full bg-white/15 flex items-center justify-center text-white">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <div>
      <h1 class="text-white font-bold text-lg">Kegiatan</h1>
      <p class="text-teal-50/80 text-xs">Agenda dan dokumentasi kegiatan</p>
    </div>
  </header>

  <main class="px-4 -mt-4">
    <div class="card-soft p-3 flex items-center gap-2">
      <div class="relative flex-1">
        <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
        <input id="searchInput" type="text" placeholder="Cari kegiatan..."
          class="input-soft w-full pl-10 pr-3 py-2.5 text-sm" />
      </div>
      <select id="filterJenis" class="input-soft py-2.5 px-2 text-sm shrink-0">
        <option value="">Semua Jenis</option>
        <option>Latihan Rutin</option>
        <option>Perkemahan</option>
        <option>Pelantikan</option>
        <option>Bakti Sosial</option>
        <option>Lomba</option>
        <option>Lainnya</option>
      </select>
    </div>

    <div id="kegiatanList" class="mt-4 space-y-3"></div>
  </main>

  <button id="btnAdd" class="fab-scan fixed bottom-6 right-5 w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl shadow-lg">
    <i class="fa-solid fa-plus"></i>
  </button>

  <!-- ===== Form Modal ===== -->
  <div id="formModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-end sm:items-center justify-center">
    <div class="bg-white w-full sm:max-w-lg rounded-t-[var(--radius-lg)] sm:rounded-[var(--radius-lg)] max-h-[92vh] overflow-y-auto p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 id="formTitle" class="font-bold text-lg text-slate-800">Tambah Kegiatan</h2>
        <button id="btnCloseForm" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="kegiatanForm" class="space-y-3 text-sm">
        <input type="hidden" id="f_id" />
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Nama Kegiatan</label>
          <input id="f_nama" class="input-soft w-full px-3 py-2.5" required />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Jenis Kegiatan</label>
            <select id="f_jenis" class="input-soft w-full px-3 py-2.5">
              <option>Latihan Rutin</option>
              <option>Perkemahan</option>
              <option>Pelantikan</option>
              <option>Bakti Sosial</option>
              <option>Lomba</option>
              <option>Lainnya</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Tanggal</label>
            <input type="date" id="f_tanggal" class="input-soft w-full px-3 py-2.5" required />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Lokasi</label>
          <input id="f_lokasi" class="input-soft w-full px-3 py-2.5" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Deskripsi</label>
          <textarea id="f_deskripsi" rows="2" class="input-soft w-full px-3 py-2.5"></textarea>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Jumlah Peserta (estimasi)</label>
          <input type="number" min="0" id="f_pesertaCount" class="input-soft w-full px-3 py-2.5" />
        </div>
        <div class="grid grid-cols-3 gap-2 pt-1">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Proposal</label>
            <input type="file" id="f_proposal" class="text-xs w-full" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">LPJ</label>
            <input type="file" id="f_lpj" class="text-xs w-full" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Foto Dokumentasi</label>
            <input type="file" id="f_foto" accept="image/*" class="text-xs w-full" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Status</label>
          <select id="f_status" class="input-soft w-full px-3 py-2.5">
            <option value="rencana">Rencana</option>
            <option value="berlangsung">Berlangsung</option>
            <option value="selesai">Selesai</option>
          </select>
        </div>
        <button type="submit" class="btn-primary w-full py-3 mt-2">Simpan Kegiatan</button>
      </form>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/pages/kegiatan.js"></script>
</body>
</html>
