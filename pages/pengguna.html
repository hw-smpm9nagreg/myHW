<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>myHW - Manajemen Pengguna</title>
<link rel="icon" href="https://lh3.googleusercontent.com/d/1csvYSWImSM_A8khBCr8K1ovcKW8wCuaw" />
<link rel="manifest" href="../manifest.json" />
<meta name="theme-color" content="#0F766E" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="pb-10" style="background: var(--color-bg);">

  <header class="gradient-primary px-4 pt-6 pb-8 flex items-center gap-3" style="border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg);">
    <a href="../dashboard.html" class="w-9 h-9 rounded-full bg-white/15 flex items-center justify-center text-white">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <div>
      <h1 class="text-white font-bold text-lg">Manajemen Pengguna</h1>
      <p class="text-teal-50/80 text-xs">Kelola akun &amp; hak akses (khusus admin)</p>
    </div>
  </header>

  <main class="px-4 -mt-4">

    <!-- ===== Info role ===== -->
    <div class="card-soft p-3 grid grid-cols-2 gap-2 text-[11px]">
      <div class="bg-teal-50 rounded-[var(--radius-sm)] p-2.5">
        <p class="font-bold text-primary">Admin</p>
        <p class="text-slate-500 mt-0.5">Akses penuh ke semua modul</p>
      </div>
      <div class="bg-sky-50 rounded-[var(--radius-sm)] p-2.5">
        <p class="font-bold text-sky-600">Pembina</p>
        <p class="text-slate-500 mt-0.5">Anggota, Kegiatan, Absensi, dll (non-keuangan)</p>
      </div>
      <div class="bg-lime-50 rounded-[var(--radius-sm)] p-2.5">
        <p class="font-bold text-lime-600">Bendahara</p>
        <p class="text-slate-500 mt-0.5">Khusus modul Keuangan</p>
      </div>
      <div class="bg-slate-100 rounded-[var(--radius-sm)] p-2.5">
        <p class="font-bold text-slate-600">Anggota</p>
        <p class="text-slate-500 mt-0.5">Akses baca terbatas + profil sendiri</p>
      </div>
    </div>

    <!-- ===== Search ===== -->
    <div class="card-soft p-3 mt-3 flex items-center gap-2">
      <div class="relative flex-1">
        <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
        <input id="searchInput" type="text" placeholder="Cari nama / username / email..." class="input-soft w-full pl-10 pr-3 py-2.5 text-sm" />
      </div>
    </div>

    <div id="userList" class="mt-4 space-y-3"></div>
  </main>

  <button id="btnAdd" class="fab-scan fixed bottom-6 right-5 w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl shadow-lg">
    <i class="fa-solid fa-user-plus"></i>
  </button>

  <!-- ===== Add User Modal ===== -->
  <div id="formModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-end sm:items-center justify-center">
    <div class="bg-white w-full sm:max-w-md rounded-t-[var(--radius-lg)] sm:rounded-[var(--radius-lg)] max-h-[92vh] overflow-y-auto p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold text-lg text-slate-800">Tambah Pengguna</h2>
        <button id="btnCloseForm" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="userForm" class="space-y-3 text-sm">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Nama Lengkap</label>
          <input id="f_nama" class="input-soft w-full px-3 py-2.5" required />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Username</label>
            <input id="f_username" class="input-soft w-full px-3 py-2.5" required />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Email</label>
            <input type="email" id="f_email" class="input-soft w-full px-3 py-2.5" required />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Password Awal</label>
          <input type="text" id="f_password" class="input-soft w-full px-3 py-2.5" placeholder="Kosongkan = default hw12345" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Role</label>
          <select id="f_role" class="input-soft w-full px-3 py-2.5">
            <option value="anggota">Anggota</option>
            <option value="pembina">Pembina</option>
            <option value="bendahara">Bendahara</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button type="submit" class="btn-primary w-full py-3 mt-2">Buat Akun</button>
      </form>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/pages/pengguna.js"></script>
  <script>window.PWA_SW_PATH = "../sw.js"; window.PWA_SCOPE = "../";</script>
  <script src="../assets/js/pwa.js"></script>
</body>
</html>
