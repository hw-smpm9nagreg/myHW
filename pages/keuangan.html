<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>myHW - Keuangan</title>
<link rel="icon" href="https://lh3.googleusercontent.com/d/1csvYSWImSM_A8khBCr8K1ovcKW8wCuaw" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css" />
<link rel="manifest" href="../manifest.json" />
<meta name="theme-color" content="#0F766E" />
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="pb-10" style="background: var(--color-bg);">

  <header class="gradient-primary px-4 pt-6 pb-8 flex items-center gap-3" style="border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg);">
    <a href="../dashboard.html" class="w-9 h-9 rounded-full bg-white/15 flex items-center justify-center text-white">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <div>
      <h1 class="text-white font-bold text-lg">Keuangan</h1>
      <p class="text-teal-50/80 text-xs">Kas, donasi &amp; laporan keuangan</p>
    </div>
  </header>

  <main class="px-4 -mt-4">

    <!-- ===== Summary cards ===== -->
    <div class="grid grid-cols-3 gap-2">
      <div class="card-soft p-3 text-center">
        <p class="text-[10px] text-slate-400 font-semibold uppercase">Kas Masuk</p>
        <p id="totalMasuk" class="text-sm font-bold text-[var(--color-success)] mt-1">Rp 0</p>
      </div>
      <div class="card-soft p-3 text-center">
        <p class="text-[10px] text-slate-400 font-semibold uppercase">Kas Keluar</p>
        <p id="totalKeluar" class="text-sm font-bold text-[var(--color-danger)] mt-1">Rp 0</p>
      </div>
      <div class="card-soft p-3 text-center gradient-primary" style="border-radius: var(--radius-md);">
        <p class="text-[10px] text-teal-50 font-semibold uppercase">Saldo</p>
        <p id="totalSaldo" class="text-sm font-bold text-white mt-1">Rp 0</p>
      </div>
    </div>

    <!-- ===== Chart ===== -->
    <div class="card-soft p-4 mt-3">
      <h2 class="font-bold text-slate-800 text-sm mb-3">Grafik Kas per Bulan</h2>
      <canvas id="keuanganChart" height="140"></canvas>
    </div>

    <!-- ===== Filter + actions ===== -->
    <div class="card-soft p-3 mt-3 flex items-center gap-2">
      <select id="filterJenis" class="input-soft py-2.5 px-2 text-sm flex-1">
        <option value="">Semua Jenis</option>
        <option value="masuk">Kas Masuk</option>
        <option value="keluar">Kas Keluar</option>
      </select>
      <select id="filterKategori" class="input-soft py-2.5 px-2 text-sm flex-1">
        <option value="">Semua Kategori</option>
        <option>Iuran Anggota</option>
        <option>Donasi</option>
        <option>Bantuan</option>
        <option>Perlengkapan</option>
        <option>Konsumsi</option>
        <option>Transportasi</option>
        <option>Lainnya</option>
      </select>
      <button id="btnExport" class="w-11 h-11 rounded-[var(--radius-sm)] bg-slate-100 flex items-center justify-center text-slate-600 shrink-0">
        <i class="fa-solid fa-file-excel"></i>
      </button>
    </div>

    <!-- ===== List ===== -->
    <div id="keuanganList" class="mt-4 space-y-2.5"></div>
  </main>

  <button id="btnAdd" class="fab-scan fixed bottom-6 right-5 w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl shadow-lg">
    <i class="fa-solid fa-plus"></i>
  </button>

  <!-- ===== Form Modal ===== -->
  <div id="formModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-end sm:items-center justify-center">
    <div class="bg-white w-full sm:max-w-md rounded-t-[var(--radius-lg)] sm:rounded-[var(--radius-lg)] max-h-[92vh] overflow-y-auto p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 id="formTitle" class="font-bold text-lg text-slate-800">Tambah Transaksi</h2>
        <button id="btnCloseForm" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="keuanganForm" class="space-y-3 text-sm">
        <input type="hidden" id="f_id" />
        <div class="grid grid-cols-2 gap-2">
          <button type="button" data-jenis="masuk" class="jenis-btn py-2.5 rounded-[var(--radius-sm)] border font-semibold text-sm">Kas Masuk</button>
          <button type="button" data-jenis="keluar" class="jenis-btn py-2.5 rounded-[var(--radius-sm)] border font-semibold text-sm">Kas Keluar</button>
        </div>
        <input type="hidden" id="f_jenis" value="masuk" />
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Tanggal</label>
          <input type="date" id="f_tanggal" class="input-soft w-full px-3 py-2.5" required />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Kategori</label>
          <select id="f_kategori" class="input-soft w-full px-3 py-2.5">
            <option>Iuran Anggota</option>
            <option>Donasi</option>
            <option>Bantuan</option>
            <option>Perlengkapan</option>
            <option>Konsumsi</option>
            <option>Transportasi</option>
            <option>Lainnya</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Jumlah (Rp)</label>
          <input type="number" min="0" id="f_jumlah" class="input-soft w-full px-3 py-2.5" required />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Keterangan</label>
          <textarea id="f_keterangan" rows="2" class="input-soft w-full px-3 py-2.5"></textarea>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Bukti Transaksi</label>
          <input type="file" id="f_bukti" accept="image/*,.pdf" class="text-xs w-full" />
        </div>
        <button type="submit" class="btn-primary w-full py-3 mt-2">Simpan Transaksi</button>
      </form>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/pages/keuangan.js"></script>
  <script>window.PWA_SW_PATH = "../sw.js"; window.PWA_SCOPE = "../";</script>
  <script src="../assets/js/pwa.js"></script>
</body>
</html>
